name: WooNPCs
version: '${version}'
main: com.oolongho.woonpc.WooNPCs
api-version: '1.21'
folia-supported: true
author: oolongho
description: 基于 Paper/Folia 1.21+ 的高性能数据包 NPC 插件

softdepend:
  - WooHolograms
  - PlaceholderAPI

commands:
  woonpc:
    description: WooNPCs 管理命令
    usage: /woonpc <create|remove|list|...>
    permission: woonpc.admin
    aliases: [wn, npc]

permissions:
  woonpc.admin:
    description: 管理员权限（执行 /woonpc 命令的入口校验）
    default: op
  woonpc.gui:
    description: 打开 GUI 管理面板权限（/woonpc gui 子命令独立校验）
    default: op
